# gzip.conf — compressió de JS/CSS/JSON (context http)
#
# Instal·lació: aquest bloc va DINS del `http { }` de /etc/nginx/nginx.conf
#               (substituint les línies comentades que hi ha de fàbrica).
#
# Per què: `gzip on;` sol NO serveix de res. El default d'nginx per a gzip_types
# és NOMÉS text/html, així que els .js i .css viatgen en cru. Mesurat a staging:
# la càrrega inicial eren 1,06 MB en comptes de 342 KB (3,2×).
# (Origen: DIAGNOSI_RENDIMENT_SESSIO_2026-07-22.md §B4.4, punt 2 del veredicte.)
#
# Verificat 22/07/2026: index-Clj-vKsq.js 446.096 B → 145.284 B (3,07×).
#
# NOTA: woff2/png/jpg/pdf ja venen comprimits — NO afegir-los (crema CPU sense guany).

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_types
	text/plain
	text/css
	text/xml
	text/javascript
	application/javascript
	application/json
	application/xml
	application/xml+rss
	application/vnd.oai.openapi+json
	application/manifest+json
	image/svg+xml;
