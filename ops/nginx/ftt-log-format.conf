# ftt-log-format.conf — format de log amb temps de resposta (context http)
#
# Instal·lació:  /etc/nginx/conf.d/ftt-log-format.conf
#
# El format `combined` per defecte NO porta $request_time ni $upstream_response_time
# ni $host: amb ell el p95 de latència per endpoint és incalculable i els logs dels
# vhosts de la màquina queden barrejats.
# (Origen: DIAGNOSI_RENDIMENT_SESSIO_2026-07-22.md §B2.5, punt 20 del veredicte.)
#
# Camps afegits respecte de `combined`:
#   $host                    — separa staging / backoffice / assessment
#   $request_time            — temps total de la petició (client → resposta completa)
#   $upstream_response_time  — temps que hi ha posat gunicorn (aïlla app vs xarxa)

log_format ftt_timing '$remote_addr - $remote_user [$time_local] "$host" '
                      '"$request" $status $body_bytes_sent '
                      'rt=$request_time urt=$upstream_response_time '
                      '"$http_referer" "$http_user_agent"';
