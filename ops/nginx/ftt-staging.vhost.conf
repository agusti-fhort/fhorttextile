server {
    server_name staging.fhorttextile.tech;
    client_max_body_size 25M;

    # Logs propis del vhost amb temps de resposta (format definit a
    # conf.d/ftt-log-format.conf). Sense $request_time el p95 per endpoint
    # és incalculable — DIAGNOSI_RENDIMENT_SESSIO_2026-07-22 §B2.5.
    access_log /var/log/nginx/ftt-staging-access.log ftt_timing;
    error_log  /var/log/nginx/ftt-staging-error.log;

    # Auth bàsica — tanca l'accés a curiosos i indexadors
    auth_basic "FTT Staging";
    auth_basic_user_file /etc/nginx/.htpasswd-staging;

    # Permetre el repte HTTP-01 de Let's Encrypt sense auth
    location ^~ /.well-known/acme-challenge/ {
        auth_basic off;
        allow all;
        default_type "text/plain";
        root /var/www/ftt-staging/frontend/dist;
    }

    # Frontend (React build estàtic)
    root /var/www/ftt-staging/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API i admin — proxy cap a gunicorn staging (port 8001)
    location /api/ {
        auth_basic off;   # l'API ja té auth JWT pròpia; l'auth bàsica trencava les XHR
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    location /admin/ {
        auth_basic off;   # el Django admin té el seu propi login
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
    }

    location /media/ {
        alias /var/www/ftt-staging/backend/media/;
    }

    # Servei intern per a X-Accel-Redirect (endpoint gated de Django).
    location /protected-media/ {
        internal;
        auth_basic off;
        alias /var/www/ftt-staging/backend/media/;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/staging.fhorttextile.tech/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/staging.fhorttextile.tech/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = staging.fhorttextile.tech) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name staging.fhorttextile.tech;
    return 404; # managed by Certbot


}
